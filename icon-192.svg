<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="trident" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  <!-- Trident -->
  <g fill="url(#trident)" stroke="url(#trident)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center prong -->
    <path d="M96 36 L96 130" />
    <!-- Crown bar -->
    <path d="M58 56 L134 56" stroke-width="8"/>
    <!-- Left prong -->
    <path d="M58 56 L58 80 Q58 92 70 92" fill="none"/>
    <!-- Right prong -->
    <path d="M134 56 L134 80 Q134 92 122 92" fill="none"/>
    <!-- Left tip -->
    <path d="M58 36 L58 56" />
    <!-- Right tip -->
    <path d="M134 36 L134 56" />
    <!-- Handle base -->
    <circle cx="96" cy="138" r="9" fill="url(#trident)"/>
    <path d="M84 156 L108 156" stroke-width="9"/>
  </g>
  <text x="96" y="178" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="700" fill="#bae6fd" letter-spacing="2">POSEIDON</text>
</svg>
